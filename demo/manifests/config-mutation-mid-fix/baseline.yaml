apiVersion: v1
kind: Namespace
metadata:
  name: bench
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: web-config
  namespace: bench
data:
  mode: good
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: bench
  labels:
    app: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: busybox:1.36
          command:
            - sh
            - -c
            - mkdir -p /www && echo ok >/www/index.html && httpd -f -p 8080 -h /www
          ports:
            - containerPort: 8080
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - test "$(cat /config/mode)" = good
            initialDelaySeconds: 2
            periodSeconds: 3
          volumeMounts:
            - name: config
              mountPath: /config
            - name: web-root
              mountPath: /www
      volumes:
        - name: config
          configMap:
            name: web-config
        - name: web-root
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: bench
spec:
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 8080
