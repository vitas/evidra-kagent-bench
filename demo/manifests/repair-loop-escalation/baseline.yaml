apiVersion: v1
kind: Namespace
metadata:
  name: bench
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: bench
data:
  default.conf: |
    server {
        listen 80;
        server_name localhost;
        location / {
            return 200 'ok\n';
            add_header Content-Type text/plain;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: bench
  labels:
    app: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: config
          configMap:
            name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: bench
spec:
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 80
