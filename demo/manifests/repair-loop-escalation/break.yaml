apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: bench
data:
  default.conf: |
    server {
        listen 80;
        server_name localhost;
        location / {
            return 503 'maintenance\n';
            add_header Content-Type text/plain;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: bench
spec:
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: nginx
          image: nginx:99.99-nonexistent
