services:
  # Traefik reverse proxy — single entry point for both UIs.
  # localhost:28080/        → evidra-api (evidence, bench trigger, embedded UI)
  # localhost:28080/lab/    → bench-ui (certification, leaderboard)
  traefik:
    image: traefik:v3.4
    ports:
      - "${DEMO_PORT:-28080}:80"
    volumes:
      - ./demo/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./demo/traefik/routes.yml:/etc/traefik/routes.yml:ro
    depends_on:
      evidra-api:
        condition: service_started
      bench-ui:
        condition: service_started

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: evidra
      POSTGRES_PASSWORD: evidra
      POSTGRES_DB: evidra
    volumes:
      - ./demo/postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evidra"]
      interval: 5s
      timeout: 3s
      retries: 5

  evidra-api:
    image: ${EVIDRA_API_IMAGE:-ghcr.io/vitas/evidra-api:0.5.18}
    environment:
      - DATABASE_URL=postgres://evidra:evidra@postgres:5432/evidra?sslmode=disable
      - EVIDRA_API_KEY=${EVIDRA_API_KEY:-dev-api-key}
      - EVIDRA_SIGNING_MODE=optional
      - LISTEN_ADDR=:8080
      - EVIDRA_BENCH_SERVICE_URL=http://bench-cli:8090
      - EVIDRA_SELF_URL=http://evidra-api:8080
      # LLM provider API keys — models with a set key appear as available in the UI.
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-${LLM_API_KEY:-}}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

  evidra-mcp:
    image: ${EVIDRA_MCP_IMAGE:-ghcr.io/vitas/evidra-mcp:0.5.18}
    command: ["-transport", "streamable-http", "-port", "3001", "-signing-mode", "optional", "-evidence-dir", "/tmp/evidence", "-url", "http://evidra-api:8080", "-api-key", "${EVIDRA_API_KEY:-dev-api-key}"]
    environment:
      - KUBECONFIG=/kube/config
    volumes:
      - kubeconfig:/kube
    depends_on:
      evidra-api:
        condition: service_started
    # Note: healthcheck removed — distroless image has no shell/curl/wget.
    # The service is healthy when it starts accepting MCP connections.

  agentgateway:
    image: cr.agentgateway.dev/agentgateway:0.11.1
    command: ["--file", "/etc/agentgateway/config.yaml"]
    ports:
      - "${DEMO_AGENTGATEWAY_PORT:-23000}:3000"
    volumes:
      - ./demo/agentgateway/config.yaml:/etc/agentgateway/config.yaml:ro
    depends_on:
      evidra-mcp:
        condition: service_started

  # Seed demo data — loads pre-recorded bench runs and evidence into postgres.
  # Runs once after evidra-api completes migrations, idempotent via ON CONFLICT.
  demo-seed:
    image: postgres:17-alpine
    entrypoint: ["/bin/sh", "/seed/seed.sh"]
    environment:
      - DATABASE_URL=postgres://evidra:evidra@postgres:5432/evidra?sslmode=disable
    volumes:
      - ./demo/postgres/seed.sh:/seed/seed.sh:ro
      - ./demo/postgres/seed-data.sql:/seed/seed-data.sql:ro
    depends_on:
      evidra-api:
        condition: service_started
    restart: "no"

  # K3d cluster setup — creates or reuses a K3s cluster on the compose network.
  # No external network needed — k3d joins the default network via --network flag.
  #   docker compose run --rm k3d-setup
  k3d-setup:
    image: ghcr.io/k3d-io/k3d:5-dind
    entrypoint: ["/bin/sh", "/setup/setup.sh"]
    environment:
      - DEMO_CLUSTER_NAME=${DEMO_CLUSTER_NAME:-evidra-demo}
      - DEMO_NETWORK=${COMPOSE_PROJECT_NAME:-evidra-kagent-bench}_default
      - KUBECONFIG_DIR=/output
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./demo/k3d/setup.sh:/setup/setup.sh:ro
      - kubeconfig:/output

  # Bench service — runs scenarios via provider mode (built-in LLM agent loop).
  bench-cli:
    image: ${BENCH_IMAGE:-ghcr.io/vitas/bench-cli:0.5.6}
    environment:
      - EVIDRA_URL=http://evidra-api:8080
      - EVIDRA_API_KEY=${EVIDRA_API_KEY:-dev-api-key}
      - BENCH_SERVICE_ADDR=:8090
      - BENCH_DATABASE_URL=postgres://evidra:evidra@postgres:5432/evidra?sslmode=disable
      - KUBECONFIG=/kube/config
      - INFRA_BENCH_SCENARIOS_DIR=/scenarios
      - INFRA_BENCH_PROVIDER=${BENCH_PROVIDER:-bifrost}
      - INFRA_BENCH_MODEL=${KAGENT_MODEL:-deepseek-chat}
      - INFRA_BENCH_MCP_SERVER=evidra-mcp --signing-mode optional -url http://evidra-api:8080 -api-key ${EVIDRA_API_KEY:-dev-api-key}
      - INFRA_BENCH_CLUSTER_NAME=${DEMO_CLUSTER_NAME:-evidra-demo}
      - INFRA_BENCH_REUSE_CLUSTER=true
      - INFRA_BENCH_PARALLEL=${BENCH_PARALLEL:-1}
      - INFRA_BENCH_BIFROST_URL=${LLM_BASE_URL:-https://api.deepseek.com/v1}
      - EVIDRA_BIFROST_AUTH_BEARER=${LLM_API_KEY:-}
      - INFRA_BENCH_A2A_AGENT_URL=http://kagent:8080
    volumes:
      - kubeconfig:/kube
      - bench-runs:/workspace/runs
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      evidra-api:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8090/healthz >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 30s

  # Bench UI — certification/leaderboard viewer, served under /lab/ via Traefik.
  # Pre-built with demo settings (localhost:28080, /lab/ base path).
  bench-ui:
    image: ${BENCH_UI_IMAGE:-ghcr.io/vitas/bench-ui:demo}

  # kagent — Google ADK-based K8s agent, benchmarked via agentgateway + evidra-mcp.
  kagent:
    build:
      context: ./demo/kagent
      dockerfile: Dockerfile
    environment:
      - KAGENT_URL=http://unused.local
      - KAGENT_NAME=demoagent
      - KAGENT_NAMESPACE=demo
      - KAGENT_MCP_URL=http://agentgateway:3000/mcp/http
      - KAGENT_MODEL=${KAGENT_MODEL:-deepseek-chat}
      - KAGENT_MODEL_PROVIDER=${KAGENT_MODEL_PROVIDER:-openai}
      - OPENAI_BASE_URL=${LLM_BASE_URL:-}
      - OPENAI_API_KEY=${LLM_API_KEY:-}
      - DEEPSEEK_API_KEY=${LLM_API_KEY:-}
      - KAGENT_TOOL_ALLOW_LIST=${KAGENT_TOOL_ALLOW_LIST:-}
      - KAGENT_SYSTEM_PROMPT_FILE=/demo/prompts/kagent-${DEMO_RUN_LABEL:-before}.md
    volumes:
      - ./demo/prompts:/demo/prompts:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    depends_on:
      agentgateway:
        condition: service_started

volumes:
  kubeconfig:   # K3d cluster kubeconfig (shared across services)
  bench-runs:   # bench-cli scenario run artifacts
