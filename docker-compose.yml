services:
  # Traefik reverse proxy — single entry point for both UIs.
  # localhost:28080/        → evidra-api (evidence, bench trigger, embedded UI)
  # localhost:28080/lab/    → bench-ui (certification, leaderboard)
  traefik:
    image: traefik:v3.4
    ports:
      - "${DEMO_PORT:-28080}:80"
    volumes:
      - ./demo/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./demo/traefik/routes.yml:/etc/traefik/routes.yml:ro
    depends_on:
      evidra-api:
        condition: service_started
      bench-ui:
        condition: service_started

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: evidra
      POSTGRES_PASSWORD: evidra
      POSTGRES_DB: evidra
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evidra"]
      interval: 5s
      timeout: 3s
      retries: 5

  evidra-api:
    image: ${EVIDRA_API_IMAGE:-ghcr.io/vitas/evidra-api:latest}
    environment:
      - DATABASE_URL=postgres://evidra:evidra@postgres:5432/evidra?sslmode=disable
      - EVIDRA_API_KEY=${EVIDRA_API_KEY:-dev-api-key}
      - EVIDRA_SIGNING_MODE=optional
      - LISTEN_ADDR=:8080
      - EVIDRA_BENCH_SERVICE_URL=http://bench-cli:8090
      - EVIDRA_SELF_URL=http://evidra-api:8080
    depends_on:
      postgres:
        condition: service_healthy

  evidra-mcp:
    image: ${EVIDRA_MCP_IMAGE:-ghcr.io/vitas/evidra-mcp:latest}
    command: ["-transport", "streamable-http", "-port", "3001", "-signing-mode", "optional", "-evidence-dir", "/tmp/evidence", "-url", "http://evidra-api:8080", "-api-key", "${EVIDRA_API_KEY:-dev-api-key}"]
    environment:
      - KUBECONFIG=/kube/config
    volumes:
      - kubeconfig:/kube
    depends_on:
      evidra-api:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3001/health >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - default
      - kind

  agentgateway:
    image: cr.agentgateway.dev/agentgateway:0.11.1
    command: ["--file", "/etc/agentgateway/config.yaml"]
    ports:
      - "${DEMO_AGENTGATEWAY_PORT:-23000}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./demo/agentgateway/config.yaml:/etc/agentgateway/config.yaml:ro
    depends_on:
      evidra-mcp:
        condition: service_started
    networks:
      - default
      - kind

  # Bench service — runs scenarios via provider mode (built-in LLM agent loop).
  bench-cli:
    image: ${BENCH_IMAGE:-ghcr.io/vitas/bench-cli:latest}
    environment:
      - EVIDRA_URL=http://evidra-api:8080
      - EVIDRA_API_KEY=${EVIDRA_API_KEY:-dev-api-key}
      - BENCH_SERVICE_ADDR=:8090
      - BENCH_DATABASE_URL=postgres://evidra:evidra@postgres:5432/evidra?sslmode=disable
      - KUBECONFIG=/kube/config
      - INFRA_BENCH_SCENARIOS_DIR=/scenarios
      - INFRA_BENCH_PROVIDER=${BENCH_PROVIDER:-bifrost}
      - INFRA_BENCH_MODEL=${KAGENT_MODEL:-deepseek-chat}
      - INFRA_BENCH_MCP_SERVER=evidra-mcp --signing-mode optional -url http://evidra-api:8080 -api-key ${EVIDRA_API_KEY:-dev-api-key}
      - INFRA_BENCH_CLUSTER_NAME=${DEMO_CLUSTER_NAME:-evidra-demo}
      - INFRA_BENCH_REUSE_CLUSTER=true
      - INFRA_BENCH_BIFROST_URL=${LLM_BASE_URL:-https://api.deepseek.com/v1}
      - EVIDRA_BIFROST_AUTH_BEARER=${LLM_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - kubeconfig:/kube
      - bench-runs:/workspace/runs
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      evidra-api:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8090/healthz >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 30s
    networks:
      - default
      - kind

  # Bench UI — certification/leaderboard viewer, served under /lab/ via Traefik.
  bench-ui:
    image: ${BENCH_UI_IMAGE:-ghcr.io/samebits/evidra-bench-ui:latest}
    build:
      context: ${BENCH_UI_CONTEXT:-../evidra-bench/ui}
      args:
        VITE_EVIDRA_API_URL: http://localhost:${DEMO_PORT:-28080}
        VITE_EVIDRA_API_KEY: ${EVIDRA_API_KEY:-dev-api-key}
        VITE_BASE_PATH: /lab/

  # kagent — Google ADK-based K8s remediation agent for before/after demo.
  kagent:
    build:
      context: ./demo/kagent
      dockerfile: Dockerfile
    environment:
      - KAGENT_URL=http://unused.local
      - KAGENT_NAME=demoagent
      - KAGENT_NAMESPACE=demo
      - KAGENT_MCP_URL=http://agentgateway:3000/mcp/http
      - KAGENT_MODEL=${KAGENT_MODEL:-deepseek-chat}
      - KAGENT_MODEL_PROVIDER=${KAGENT_MODEL_PROVIDER:-openai}
      - OPENAI_BASE_URL=${LLM_BASE_URL:-}
      - OPENAI_API_KEY=${LLM_API_KEY:-}
      - DEEPSEEK_API_KEY=${LLM_API_KEY:-}
      - KAGENT_TOOL_ALLOW_LIST=${KAGENT_TOOL_ALLOW_LIST:-}
      - KAGENT_SYSTEM_PROMPT_FILE=/demo/prompts/kagent-${DEMO_RUN_LABEL:-before}.md
    volumes:
      - ./demo/prompts:/demo/prompts:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    depends_on:
      agentgateway:
        condition: service_started
    networks:
      - default
      - kind

  # Kind cluster bootstrap — run once to create the cluster and export kubeconfig.
  kind-bootstrap:
    build:
      context: .
      dockerfile: demo/kind/Dockerfile
    environment:
      - DEMO_CLUSTER_NAME=${DEMO_CLUSTER_NAME:-evidra-demo}
      - KUBECONFIG_DIR=/kube
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./demo/kind/kind-config.yaml:/demo/kind-config.yaml:ro
      - kubeconfig:/kube

  # Script-based demo runners for before/after kagent comparison.
  demo-seed:
    image: evidra-demo-runtime:local
    entrypoint: ["/bin/sh"]
    command: ["/demo/scripts/seed_case.sh"]
    environment:
      - DEMO_CASE=${DEMO_CASE:-broken-deployment}
      - KUBECONFIG=/kube/config
      - DEMO_ARTIFACTS_DIR=/artifacts
      - DEMO_RUN_LABEL=${DEMO_RUN_LABEL:-before}
    volumes:
      - kubeconfig:/kube
      - artifacts:/artifacts
      - ./demo/scripts/seed_case.sh:/demo/scripts/seed_case.sh:ro
      - ./demo/manifests:/demo/manifests:ro
    networks:
      - default
      - kind

  kagent-runner:
    image: evidra-demo-runtime:local
    entrypoint: ["/bin/sh"]
    command: ["/demo/scripts/run_kagent.sh"]
    environment:
      - KUBECONFIG=/kube/config
      - DEMO_CASE=${DEMO_CASE:-broken-deployment}
      - KAGENT_MODEL=${KAGENT_MODEL:-deepseek-chat}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - KAGENT_SERVICE_URL=http://kagent:8080
      - AGENTGATEWAY_BASE_URL=http://host.docker.internal:${DEMO_AGENTGATEWAY_PORT:-23000}
      - EVIDRA_BASE_URL=http://host.docker.internal:${DEMO_PORT:-28080}
      - EVIDRA_API_KEY=${EVIDRA_API_KEY:-dev-api-key}
      - DEMO_ARTIFACTS_DIR=/artifacts
      - DEMO_RUN_LABEL=${DEMO_RUN_LABEL:-before}
    depends_on:
      demo-seed:
        condition: service_completed_successfully
      kagent:
        condition: service_started
    volumes:
      - kubeconfig:/kube
      - artifacts:/artifacts
      - ./demo/scripts/run_kagent.sh:/demo/scripts/run_kagent.sh:ro
      - ./demo/prompts:/demo/prompts:ro
    networks:
      - default
      - kind
    extra_hosts:
      - "host.docker.internal:host-gateway"

  demo-verify:
    image: evidra-demo-runtime:local
    entrypoint: ["/bin/sh"]
    command: ["/demo/scripts/verify_run.sh"]
    environment:
      - KUBECONFIG=/kube/config
      - DEMO_CASE=${DEMO_CASE:-broken-deployment}
      - EVIDRA_BASE_URL=http://host.docker.internal:${DEMO_PORT:-28080}
      - EVIDRA_API_KEY=${EVIDRA_API_KEY:-dev-api-key}
      - DEMO_ARTIFACTS_DIR=/artifacts
      - DEMO_RUN_LABEL=${DEMO_RUN_LABEL:-before}
      - KAGENT_MODEL=${KAGENT_MODEL:-deepseek-chat}
    depends_on:
      kagent-runner:
        condition: service_completed_successfully
    volumes:
      - kubeconfig:/kube
      - artifacts:/artifacts
      - ./demo/scripts/verify_run.sh:/demo/scripts/verify_run.sh:ro
      - ./demo/manifests:/demo/manifests:ro
    networks:
      - default
      - kind
    extra_hosts:
      - "host.docker.internal:host-gateway"

  demo-compare:
    image: evidra-demo-runtime:local
    entrypoint: ["/bin/sh"]
    command: ["/demo/scripts/compare_runs.sh"]
    environment:
      - EVIDRA_BASE_URL=http://host.docker.internal:${DEMO_PORT:-28080}
      - EVIDRA_API_KEY=${EVIDRA_API_KEY:-dev-api-key}
      - DEMO_ARTIFACTS_DIR=/artifacts
    volumes:
      - artifacts:/artifacts
      - ./demo/scripts/compare_runs.sh:/demo/scripts/compare_runs.sh:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:       # Postgres data — evidra entries, bench runs, River jobs
  kubeconfig:   # Kind cluster kubeconfig (shared across services)
  artifacts:    # Kagent demo run artifacts (before/after)
  bench-runs:   # bench-cli scenario run artifacts

networks:
  kind:
    external: true
