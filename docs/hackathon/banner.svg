<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="magentaGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF0080"/>
      <stop offset="50%" stop-color="#D946EF"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>

    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0F"/>
      <stop offset="40%" stop-color="#0F0A1A"/>
      <stop offset="100%" stop-color="#1A0A2E"/>
    </linearGradient>

    <!-- CKA blue gradient -->
    <linearGradient id="ckaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#326CE5"/>
      <stop offset="100%" stop-color="#1A4FBF"/>
    </linearGradient>

    <!-- CKS purple gradient -->
    <linearGradient id="cksGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B2FBE"/>
      <stop offset="100%" stop-color="#5B1F9E"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="softGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="bigGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FF008012" stroke-width="0.5"/>
    </pattern>

    <!-- K8s helm shape (heptagon) for cert badges -->
    <polygon id="k8sShape" points="0,-52 45,-26 45,26 0,52 -45,26 -45,-26" fill="none"/>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.35"/>

  <!-- Subtle scan lines -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="#FF0080" stroke-width="1"/>
    <line x1="200" y1="0" x2="1200" y2="470" stroke="#FF0080" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="1000" y2="630" stroke="#FF0080" stroke-width="0.5"/>
  </g>

  <!-- Main title -->
  <text x="600" y="88" fill="url(#magentaGlow)" font-family="'Helvetica Neue', 'Arial Black', sans-serif" font-size="52" font-weight="900" letter-spacing="-1" text-anchor="middle" filter="url(#softGlow)">kAgent got CKA/CKS Certified</text>

  <!-- Subtitle -->
  <text x="600" y="128" fill="#999" font-family="'SF Mono', 'Fira Code', monospace" font-size="15" letter-spacing="0.5" text-anchor="middle">behind AgentGateway, powered by Evidra MCP</text>

  <!-- ============ CKA BADGE (left) ============ -->
  <g transform="translate(340, 330)">
    <!-- Outer glow -->
    <circle cx="0" cy="0" r="130" fill="#326CE5" opacity="0.04" filter="url(#bigGlow)"/>

    <!-- K8s-style hexagonal shape - outer -->
    <polygon points="0,-105 91,-52.5 91,52.5 0,105 -91,52.5 -91,-52.5" fill="none" stroke="#326CE520" stroke-width="1"/>

    <!-- Main badge shape -->
    <polygon points="0,-90 78,-45 78,45 0,90 -78,45 -78,-45" fill="#0A0A0F" stroke="url(#ckaGrad)" stroke-width="2.5"/>

    <!-- Inner ring -->
    <polygon points="0,-75 65,-37.5 65,37.5 0,75 -65,37.5 -65,-37.5" fill="none" stroke="#326CE525" stroke-width="0.5"/>

    <!-- K8s wheel icon (simplified) -->
    <g opacity="0.15" stroke="#326CE5" stroke-width="1.5" fill="none">
      <circle cx="0" cy="0" r="28"/>
      <circle cx="0" cy="0" r="8"/>
      <line x1="0" y1="-28" x2="0" y2="-8"/>
      <line x1="0" y1="8" x2="0" y2="28"/>
      <line x1="-24" y1="-14" x2="-7" y2="-4"/>
      <line x1="7" y1="4" x2="24" y2="14"/>
      <line x1="-24" y1="14" x2="-7" y2="4"/>
      <line x1="7" y1="-4" x2="24" y2="-14"/>
    </g>

    <!-- CKA text -->
    <text x="0" y="-38" fill="#326CE5" font-family="'Helvetica Neue', 'Arial Black', sans-serif" font-size="36" font-weight="900" text-anchor="middle" letter-spacing="4" filter="url(#softGlow)">CKA</text>

    <!-- Checkmark -->
    <g filter="url(#glow)" transform="translate(0, 8)">
      <polyline points="-16,4 -6,14 18,-8" fill="none" stroke="#326CE5" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Label -->
    <text x="0" y="55" fill="#326CE570" font-family="'SF Mono', 'Fira Code', monospace" font-size="7" text-anchor="middle" letter-spacing="1.5">KUBERNETES</text>
    <text x="0" y="67" fill="#326CE550" font-family="'SF Mono', 'Fira Code', monospace" font-size="7" text-anchor="middle" letter-spacing="1.5">ADMINISTRATOR</text>
  </g>

  <!-- ============ CKS BADGE (right) ============ -->
  <g transform="translate(860, 330)">
    <!-- Outer glow -->
    <circle cx="0" cy="0" r="130" fill="#7B2FBE" opacity="0.04" filter="url(#bigGlow)"/>

    <!-- K8s-style hexagonal shape - outer -->
    <polygon points="0,-105 91,-52.5 91,52.5 0,105 -91,52.5 -91,-52.5" fill="none" stroke="#7B2FBE20" stroke-width="1"/>

    <!-- Main badge shape -->
    <polygon points="0,-90 78,-45 78,45 0,90 -78,45 -78,-45" fill="#0A0A0F" stroke="url(#cksGrad)" stroke-width="2.5"/>

    <!-- Inner ring -->
    <polygon points="0,-75 65,-37.5 65,37.5 0,75 -65,37.5 -65,-37.5" fill="none" stroke="#7B2FBE25" stroke-width="0.5"/>

    <!-- Shield icon (simplified) -->
    <g opacity="0.15" stroke="#7B2FBE" stroke-width="1.5" fill="none">
      <path d="M 0,-28 L 22,-18 L 22,6 Q 22,22 0,30 Q -22,22 -22,6 L -22,-18 Z"/>
      <line x1="0" y1="-10" x2="0" y2="12"/>
      <line x1="-8" y1="1" x2="8" y2="1"/>
    </g>

    <!-- CKS text -->
    <text x="0" y="-38" fill="#7B2FBE" font-family="'Helvetica Neue', 'Arial Black', sans-serif" font-size="36" font-weight="900" text-anchor="middle" letter-spacing="4" filter="url(#softGlow)">CKS</text>

    <!-- Checkmark -->
    <g filter="url(#glow)" transform="translate(0, 8)">
      <polyline points="-16,4 -6,14 18,-8" fill="none" stroke="#7B2FBE" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Label -->
    <text x="0" y="55" fill="#7B2FBE70" font-family="'SF Mono', 'Fira Code', monospace" font-size="7" text-anchor="middle" letter-spacing="1.5">KUBERNETES</text>
    <text x="0" y="67" fill="#7B2FBE50" font-family="'SF Mono', 'Fira Code', monospace" font-size="7" text-anchor="middle" letter-spacing="1.5">SECURITY SPECIALIST</text>
  </g>

  <!-- ============ CENTER CONNECTOR ============ -->

  <!-- AgentGateway mark as background watermark (scaled + centered) -->
  <g transform="translate(600, 320) scale(0.32)" opacity="0.15">
    <g transform="translate(-532, -532)">
      <path d="M532.86 390.757C571.684 390.757 603.157 359.407 603.157 320.734C603.157 282.062 571.684 250.711 532.86 250.711C494.036 250.711 462.562 282.062 462.562 320.734C462.562 359.407 494.036 390.757 532.86 390.757Z" fill="#7734be"/>
      <path d="M532.86 602.194C571.684 602.194 603.157 570.844 603.157 532.171C603.157 493.499 571.684 462.148 532.86 462.148C494.036 462.148 462.562 493.499 462.562 532.171C462.562 570.844 494.036 602.194 532.86 602.194Z" fill="#7734be"/>
      <path d="M573.109 426.356C573.109 401.124 580.374 377.457 592.745 357.311L532.855 320.54L472.965 357.311C485.336 377.457 492.601 400.929 492.601 426.356C492.601 451.783 485.336 475.254 472.965 495.401L532.855 532.172L592.745 495.401C580.374 475.254 573.109 451.783 573.109 426.356Z" fill="#7734be"/>
      <path d="M705.453 496.377C744.277 496.377 775.75 465.027 775.75 426.354C775.75 387.682 744.277 356.332 705.453 356.332C666.629 356.332 635.156 387.682 635.156 426.354C635.156 465.027 666.629 496.377 705.453 496.377Z" fill="#7734be"/>
      <path d="M705.453 707.814C744.277 707.814 775.75 676.464 775.75 637.792C775.75 599.119 744.277 567.769 705.453 567.769C666.629 567.769 635.156 599.119 635.156 637.792C635.156 676.464 666.629 707.814 705.453 707.814Z" fill="#7734be"/>
      <path d="M745.703 532.171C745.703 506.94 752.968 483.273 765.339 463.127L705.449 426.355L645.559 463.127C657.929 483.273 665.195 506.744 665.195 532.171C665.195 557.599 657.929 581.07 645.559 601.216L705.449 637.988L765.339 601.216C752.968 581.07 745.703 557.599 745.703 532.171Z" fill="#7734be"/>
      <path d="M360.059 496.377C398.883 496.377 430.356 465.027 430.356 426.354C430.356 387.682 398.883 356.332 360.059 356.332C321.235 356.332 289.762 387.682 289.762 426.354C289.762 465.027 321.235 496.377 360.059 496.377Z" fill="#7734be"/>
      <path d="M360.059 707.813C398.883 707.813 430.356 676.463 430.356 637.79C430.356 599.118 398.883 567.768 360.059 567.768C321.235 567.768 289.762 599.118 289.762 637.79C289.762 676.463 321.235 707.813 360.059 707.813Z" fill="#7734be"/>
      <path d="M400.308 532.17C400.308 506.938 407.573 483.271 419.944 463.125L360.054 426.354L300.164 463.125C312.535 483.271 319.8 506.743 319.8 532.17C319.8 557.597 312.535 581.068 300.164 601.215L360.054 637.986L419.944 601.215C407.573 581.068 400.308 557.597 400.308 532.17Z" fill="#7734be"/>
      <path d="M532.86 813.436C571.684 813.436 603.157 782.086 603.157 743.413C603.157 704.741 571.684 673.391 532.86 673.391C494.036 673.391 462.562 704.741 462.562 743.413C462.562 782.086 494.036 813.436 532.86 813.436Z" fill="#7734be"/>
    </g>
  </g>

  <!-- Evidra connector lines -->
  <line x1="430" y1="330" x2="560" y2="330" stroke="#FF008025" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="640" y1="330" x2="770" y2="330" stroke="#FF008025" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- AgentGateway label above mark -->
  <text x="600" y="260" fill="#7734be" font-family="'Helvetica Neue', 'Arial Black', sans-serif" font-size="22" font-weight="700" text-anchor="middle" letter-spacing="2" opacity="0.6">AgentGateway</text>

  <!-- Small "powered by" labels -->
  <text x="600" y="400" fill="#FF008060" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" text-anchor="middle" letter-spacing="1">powered by</text>
  <text x="600" y="418" fill="#FF0080" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" text-anchor="middle" font-weight="bold" letter-spacing="1" filter="url(#softGlow)">Evidra</text>

  <!-- Bottom bar -->
  <rect x="0" y="560" width="1200" height="70" fill="#05050A"/>
  <line x1="0" y1="560" x2="1200" y2="560" stroke="#FF008030" stroke-width="1"/>

  <!-- Bottom labels -->
  <g font-family="'SF Mono', 'Fira Code', monospace" font-size="12">
    <text x="100" y="590" fill="#FF0080" font-weight="bold">evidra</text>
    <text x="100" y="608" fill="#666" font-size="10">evidence + intelligence</text>

    <text x="340" y="590" fill="#FF0080" font-weight="bold">agentgateway</text>
    <text x="340" y="608" fill="#666" font-size="10">secure MCP routing</text>

    <text x="580" y="590" fill="#FF0080" font-weight="bold">kagent</text>
    <text x="580" y="608" fill="#666" font-size="10">Google ADK agent</text>

    <text x="790" y="590" fill="#326CE5" font-weight="bold">CKA</text>
    <text x="820" y="590" fill="#666">+</text>
    <text x="838" y="590" fill="#7B2FBE" font-weight="bold">CKS</text>
    <text x="790" y="608" fill="#666" font-size="10">75 real scenarios</text>

    <text x="1040" y="590" fill="#FF0080" font-weight="bold">MCP</text>
    <text x="1040" y="608" fill="#666" font-size="10">model context protocol</text>
  </g>

  <!-- Decorative corner marks -->
  <g stroke="#FF008040" stroke-width="1" fill="none">
    <polyline points="20,20 20,50"/>
    <polyline points="20,20 50,20"/>
    <polyline points="1180,20 1180,50"/>
    <polyline points="1180,20 1150,20"/>
    <polyline points="20,540 20,510"/>
    <polyline points="20,540 50,540"/>
    <polyline points="1180,540 1180,510"/>
    <polyline points="1180,540 1150,540"/>
  </g>
</svg>
